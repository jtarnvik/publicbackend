# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none

# Let Liquibase manage the schema; session tables are created by Liquibase
spring.session.jdbc.initialize-schema=never

# Required by SecurityConfig
app.frontend-url=http://localhost:5173

# Dummy OAuth2 credentials required for context to start, never used in tests
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Dummy Samtrafiken credentials required for context to start, never used in tests
samtrafiken.api-key=test-api-key
samtrafiken.gtfs-url=https://example.com/gtfs.zip
